name: smart_irrigation_system
description: IoT-based Smart Irrigation System with real-time monitoring and control
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Local Notifications
  flutter_local_notifications: ^18.0.0

  # Connectivity
  connectivity_plus: ^6.0.0

  # Charts & Graphs
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  intl: ^0.18.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Uncomment to add custom assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
